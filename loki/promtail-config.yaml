# Promtail 配置 — 将日志发送到 Loki
#
# 以 DaemonSet 方式部署，采集以下日志:
#   1. Kubernetes Pod 日志（所有命名空间）
#   2. Node Guardian 静态日志文件（/var/log/kn-guardian_*.log）
#
# Pipeline 阶段从日志行中提取结构化字段（level, component, fleet 等），
# 使其成为可查询的 Loki 标签。

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/lib/promtail/positions.yaml

clients:
  - url: http://loki.monitoring.svc:3100/loki/api/v1/push
    batchsize: 1048576     # 1MB 批次
    batchwait: 1s
    timeout: 10s
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

scrape_configs:
  # --- Kubernetes Pod 日志 ---
  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      # 仅保留运行中的 Pod
      - source_labels: [__meta_kubernetes_pod_phase]
        regex: Running
        action: keep
      # 丢弃 promtail 自身日志，避免反馈循环
      - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
        regex: promtail
        action: drop
    pipeline_stages:
      # 解析 Docker/containerd JSON 日志格式
      - docker: {}
      # 丢弃空行/纯空白日志
      - drop:
          expression: '^\s*$'

      # --- 解析 GFD Controller 日志 ---
      # GFD 使用结构化（JSON）日志，字段: level, fleet, msg, ts
      - match:
          selector: '{app="game-fleet-director-controller"}'
          stages:
            - json:
                expressions:
                  level: level
                  fleet: fleet
                  msg: msg
                  ts: ts
            - labels:
                level: ""
                fleet: ""
            - timestamp:
                source: ts
                format: RFC3339

      # --- 解析 GFD API Server 日志 ---
      - match:
          selector: '{app="game-fleet-director-apiserver"}'
          stages:
            - json:
                expressions:
                  level: level
                  msg: msg
                  ts: ts
            - labels:
                level: ""
            - timestamp:
                source: ts
                format: RFC3339

      # --- 解析 NHW 日志 ---
      # NHW 日志格式: [YYYY-MM-DD HH:MM:SS] [LEVEL] [COMPONENT] message
      - match:
          selector: '{app="node-health-watcher"}'
          stages:
            - regex:
                expression: '^\[(?P<ts>[\d\-]+ [\d:]+)\] \[(?P<level>\w+)\] \[(?P<component>\w+)\] (?P<msg>.*)'
            - labels:
                level: ""
                component: ""
            - timestamp:
                source: ts
                format: "2006-01-02 15:04:05"

      # --- K8s 系统组件日志 ---
      - match:
          selector: '{namespace="kube-system"}'
          stages:
            - regex:
                expression: '^(?P<level>[A-Z])\d{4} [\d:]+\.\d+\s+\d+\s+(?P<component>\S+)\s+(?P<msg>.*)$'
            - labels:
                level: ""

  # --- Node Guardian 静态日志文件 ---
  - job_name: node-guardian-logs
    static_configs:
      - targets:
          - localhost
        labels:
          app: node-guardian
          job: node-guardian-logs
          __path__: /var/log/kn-guardian_*.log
    pipeline_stages:
      # Node Guardian 日志: [TIMESTAMP] [LEVEL] [MODULE] message
      - regex:
          expression: '^\[(?P<ts>[\d\-]+ [\d:]+)\] \[(?P<level>\w+)\] \[(?P<module>\w+)\] (?P<msg>.*)'
      - labels:
          level: ""
          module: ""
      - timestamp:
          source: ts
          format: "2006-01-02 15:04:05"

  # --- Loki 自身日志（自监控）---
  - job_name: loki-self
    static_configs:
      - targets:
          - localhost
        labels:
          app: loki
          job: loki
          __path__: /var/log/loki/*.log

  # --- Prometheus 日志 ---
  - job_name: prometheus-logs
    static_configs:
      - targets:
          - localhost
        labels:
          app: prometheus
          job: prometheus-server
          __path__: /var/log/prometheus/*.log

# 限制 pipeline 处理
limits_config:
  readline_rate: 10000
  readline_burst: 20000
  maxline_size: 256000
