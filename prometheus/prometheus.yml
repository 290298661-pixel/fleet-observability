# Prometheus 主配置文件
#
# 抓取 Game Fleet Director、Node Health Watcher、Node Guardian
# 以及 Kubernetes 核心指标。
#
# 告警和 recording 规则由 kube-prometheus-stack 通过
# additionalPrometheusRules Helm 值加载。

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: kind-dev
    platform: fleet-observability

# 告警和 recording 规则
rule_files:
  - /etc/prometheus/rules/alerts.yaml
  - /etc/prometheus/rules/recording.yaml

# AlertManager 配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager-operated.monitoring.svc:9093

# 抓取配置
scrape_configs:
  # Prometheus 自监控
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  # GFD Controller 指标
  - job_name: gfd-controller
    scrape_interval: 15s
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - game-fleet-system
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        regex: game-fleet-director-controller
        action: keep
      - source_labels: [__meta_kubernetes_pod_container_port_number]
        regex: "8080"
        action: keep
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace

  # GFD API Server 指标
  - job_name: gfd-apiserver
    scrape_interval: 15s
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - game-fleet-system
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        regex: game-fleet-director-apiserver
        action: keep
      - source_labels: [__meta_kubernetes_pod_container_port_number]
        regex: "8080"
        action: keep
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace

  # NHW 指标（待 NHW 仓库接入 metrics 端点）
  - job_name: nhw
    scrape_interval: 30s
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - monitoring
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        regex: node-health-watcher
        action: keep
      - source_labels: [__meta_kubernetes_pod_container_port_number]
        regex: "9090"
        action: keep
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod

  # Node Exporter（包含 Node Guardian 的 textfile collector）
  - job_name: node-exporter
    scrape_interval: 30s
    kubernetes_sd_configs:
      - role: endpoints
        namespaces:
          names:
            - monitoring
    relabel_configs:
      - source_labels: [__meta_kubernetes_service_label_app_kubernetes_io_name]
        regex: node-exporter
        action: keep

  # K8s 核心指标（通过 kube-state-metrics）
  - job_name: kube-state-metrics
    scrape_interval: 30s
    kubernetes_sd_configs:
      - role: endpoints
        namespaces:
          names:
            - monitoring
    relabel_configs:
      - source_labels: [__meta_kubernetes_service_label_app_kubernetes_io_name]
        regex: kube-state-metrics
        action: keep
