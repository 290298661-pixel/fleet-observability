# Grafana 配置
# 当 Grafana 独立部署（不通过 kube-prometheus-stack Helm chart）时使用。
# 使用 Helm chart 部署时，请通过 values.yaml 设置这些参数。

[server]
protocol = http
http_port = 3000
domain = localhost
root_url = %(protocol)s://%(domain)s:%(http_port)s/

[security]
admin_user = admin
admin_password = admin
disable_gravatar = true

# 允许匿名只读访问以查看仪表盘（仅开发环境）
[auth.anonymous]
enabled = true
org_name = Main Org.
org_role = Viewer

# 匿名访问时禁用 basic auth
[auth.basic]
enabled = false

# 统一告警（Grafana 10+）
[unified_alerting]
enabled = true

[alerting]
enabled = false

# 仪表盘 — JSON 文件通过 provisioning 自动装载
[dashboards]
versions_to_keep = 20
min_refresh_interval = 5s

# SMTP（占位 — 用于将来的邮件告警）
[smtp]
enabled = false
host = localhost:25
from_address = grafana@fleet-observability.local

# 功能开关
[feature_toggles]
enable = traceToMetrics, traceToLogs, lokiLogsDataplane

# 日志
[log]
level = info
mode = console

# 渲染（可选 — 用于仪表盘 PDF 导出）
[rendering]
server_url = http://localhost:8081/render
callback_url = http://localhost:3000/

# 分析
[analytics]
reporting_enabled = false
check_for_updates = false

# 日期格式
[date_formats]
full_date = YYYY-MM-DD HH:mm:ss
interval_second = HH:mm:ss
interval_minute = HH:mm
interval_hour = MM/DD HH:mm
interval_day = MM/DD
interval_month = YYYY-MM
interval_year = YYYY

# 数据代理 — 后端查询超时
[dataproxy]
timeout = 30
