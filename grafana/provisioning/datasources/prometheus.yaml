# Grafana 数据源 Provisioning — Prometheus
# Grafana 启动时自动装载。无需在 UI 中手动配置。

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus-operated.monitoring.svc:9090
    isDefault: true
    version: 1
    editable: false
    jsonData:
      timeInterval: 15s
      queryTimeout: 30s
      httpMethod: POST
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: tempo
      # 启用 Grafana 中的 Prometheus alertmanager 集成
      alertmanagerUid: alertmanager
