# Grafana 数据源 Provisioning — Loki
# Grafana 启动时自动装载。无需在 UI 中手动配置。

apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki.monitoring.svc:3100
    version: 1
    editable: false
    jsonData:
      maxLines: 5000
      derivedFields:
        # 将日志中的 trace ID 关联到 Tempo（将来 Phase B 的增强功能）
        - name: traceID
          matcherRegex: 'trace_id=(\w+)'
          url: '$${__value.raw}'
          datasourceUid: tempo
        # 将日志中的 Prometheus 指标名链接回指标
        - name: metricLink
          matcherRegex: 'metric=(\w+)'
          datasourceUid: prometheus
